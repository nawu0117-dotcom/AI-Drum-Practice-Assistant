<!DOCTYPE html>

<html>

<head>

<title>Drum Learning Tool</title>

<style>

body{

font-family:Arial;

background:#f1f5f9;

text-align:center;

}

.container{

width:70%;

max-width:900px;

margin:auto;

}

.card{

background:white;

padding:30px;

margin:25px;

border-radius:15px;

box-shadow:0 5px 15px rgba(0,0,0,0.1);

}

button{

background:#2563eb;

color:white;

border:none;

padding:12px;

margin:8px;

border-radius:8px;

font-size:16px;

cursor:pointer;

}

button:hover{

background:#1d4ed8;

}

h1{

color:#1e3a8a;

}

.slider{

width:60%;

}

</style>

</head>

<body>

<h1>

Drum Practice Learning Tool

</h1>

<p>

AI輔助設計的爵士鼓初學者學習工具

</p>

<div class="container">

<div class="card">

<h2 id="title">

基礎8 Beat

</h2>

<p id="practice">

Hi-hat：8分音符<br>

Snare：2、4<br>

Bass：1、3

</p>

<button onclick="basic()">

基礎節奏

</button>

<button onclick="coord()">

協調練習

</button>

<button onclick="fill()">

過門

</button>

</div>

<div class="card">

<h2>

節拍器

</h2>

<p>

BPM：

<span id="bpm">

80

</span>

</p>

<input

type="range"

min="40"

max="200"

value="80"

class="slider"

oninput="changeBPM(this.value)"

>

<br><br>

<button onclick="startMet()">

Start

</button>

<button onclick="stopMet()">

Stop

</button>

</div>

<div class="card">

<h2>

練習計時器

</h2>

<p id="time">

0 秒

</p>

<button onclick="startTimer()">

開始練習

</button>

<button onclick="stopTimer()">

結束

</button>

</div>

</div>

<script>

let bpm=80

let met

let audioCtx=new(window.AudioContext)

function click(){

let osc=audioCtx.createOscillator()

let gain=audioCtx.createGain()

osc.connect(gain)

gain.connect(audioCtx.destination)

osc.frequency.value=1000

osc.start()

gain.gain.exponentialRampToValueAtTime(

0.0001,

audioCtx.currentTime+0.05

)

osc.stop(audioCtx.currentTime+0.05)

}

function startMet(){

let interval=60000/bpm

met=setInterval(click,interval)

}

function stopMet(){

clearInterval(met)

}

function changeBPM(v){

bpm=v

document.getElementById("bpm").innerHTML=v

if(met){

stopMet()

startMet()

}

}

function basic(){

document.getElementById("title").innerHTML="基礎8 Beat"

document.getElementById("practice").innerHTML=

"Hi-hat：8分<br>Snare：2、4<br>Bass：1、3"

}

function coord(){

document.getElementById("title").innerHTML="協調"

document.getElementById("practice").innerHTML=

"Hi-hat 8分<br>Snare 2、4<br>Bass 1、3&"

}

function fill(){

document.getElementById("title").innerHTML="過門"

document.getElementById("practice").innerHTML=

"Snare 1 2 3 4"

}

let time=0

let timer

function startTimer(){

timer=setInterval(function(){

time++

document.getElementById("time").innerHTML=

time+" 秒"

},1000)

}

function stopTimer(){

clearInterval(timer)

time=0

document.getElementById("time").innerHTML="0 秒"

}

</script>

</body>

</html>
