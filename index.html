<!DOCTYPE html>
<html>

<head>
<title>Drum Practice Tool</title>

<style>

body{
font-family: Arial;
text-align:center;
background:#f4f4f4;
}

.card{

background:white;

padding:20px;

margin:20px auto;

width:400px;

border-radius:10px;

box-shadow:0 0 10px gray;

}

button{

padding:10px;

margin:5px;

font-size:16px;

}

</style>

</head>

<body>

<h1>爵士鼓基礎練習工具</h1>

<div class="card">

<h2>基礎8 Beat</h2>

<p>
Hi-hat：8分音符<br>

Snare：2、4拍<br>

Bass：1、3拍
</p>

<p>
建議速度：60–80 BPM
</p>

<p>
練習重點：
穩定節奏，不要忽快忽慢
</p>

<button onclick="nextPractice()">
下一個練習
</button>

</div>

<script>

function nextPractice(){

alert("下一個練習可以再新增！")

}

</script>

</body>

</html>
