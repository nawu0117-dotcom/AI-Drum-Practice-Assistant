<!DOCTYPE html>

<html>

<head>

<title>Drum Practice Tool</title>

<style>

body{

font-family: Arial;

background:#0f172a;

color:white;

text-align:center;

}

.card{

background:#1e293b;

padding:25px;

margin:30px auto;

width:500px;

border-radius:15px;

box-shadow:0 0 20px black;

}

button{

background:#38bdf8;

border:none;

padding:12px;

margin:6px;

font-size:16px;

border-radius:8px;

cursor:pointer;

}

button:hover{

background:#0284c7;

}

h1{

color:#38bdf8;

}

</style>

</head>

<body>

<h1>AI Drum Practice Tool</h1>

<p>

AI協助設計的爵士鼓初學者練習工具

</p>

<div class="card">

<h2 id="title">

基礎8 Beat

</h2>

<p id="practice">

Hi-hat：8分音符<br>

Snare：2、4<br>

Bass：1、3

</p>

<p id="tip">

練習重點：保持穩定

</p>

<button onclick="practice1()">

基礎節奏

</button>

<button onclick="practice2()">

協調練習

</button>

<button onclick="practice3()">

過門練習

</button>

</div>

<div class="card">

<h2>

節拍器

</h2>

<p>

BPM:

<span id="bpm">

60

</span>

</p>

<button onclick="down()">

-

</button>

<button onclick="up()">

+

</button>

<br><br>

<button onclick="start()">

Start

</button>

<button onclick="stop()">

Stop

</button>

</div>

<script>

let bpm=60

let timer

function up(){

bpm+=5

document.getElementById("bpm").innerHTML=bpm

}

function down(){

bpm-=5

document.getElementById("bpm").innerHTML=bpm

}

function start(){

let speed=60000/bpm

timer=setInterval(click,speed)

}

function stop(){

clearInterval(timer)

}

function click(){

let sound=new Audio(

"https://actions.google.com/sounds/v1/alarms/beep_short.ogg"

)

sound.play()

}

function practice1(){

document.getElementById("title").innerHTML="基礎8 Beat"

document.getElementById("practice").innerHTML=

"Hi-hat：8分音符<br>Snare：2、4<br>Bass：1、3"

document.getElementById("tip").innerHTML=

"練習重點：穩定節奏"

}

function practice2(){

document.getElementById("title").innerHTML="協調練習"

document.getElementById("practice").innerHTML=

"Hi-hat：8分<br>Snare：2、4<br>Bass：1、3&"

document.getElementById("tip").innerHTML=

"練習重點：手腳同步"

}

function practice3(){

document.getElementById("title").innerHTML="過門練習"

document.getElementById("practice").innerHTML=

"Snare 1 2 3 4"

document.getElementById("tip").innerHTML=

"練習重點：回到節奏"

}

</script>

</body>

</html>
